<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Deposits · Zerodha Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1e2a3f;
            --border-color: #2a3548;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.12);
            --green-light: #34d399;
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.12);
            --red-light: #f87171;
            --yellow: #f59e0b;
            --yellow-bg: rgba(245, 158, 11, 0.12);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.12);
            --purple: #8b5cf6;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --orange: #f97316;
            --teal: #14b8a6;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --gradient-3: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            --gradient-fd: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .logo {
            width: 40px; height: 40px;
            background: var(--gradient-fd);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: white;
        }

        .header-title h1 {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header-title p { font-size: 12px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .btn {
            padding: 8px 20px;
            border-radius: var(--radius-xs);
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .demo-badge {
            background: var(--yellow-bg);
            color: var(--yellow);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: none;
        }

        .demo-badge.show { display: inline-block; }

        /* View Toggle */
        .view-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xs);
            padding: 4px;
        }

        .view-btn {
            padding: 6px 14px;
            border-radius: 4px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            background: transparent;
            color: var(--text-muted);
        }

        .view-btn:hover { color: var(--text-secondary); }
        .view-btn.active { background: var(--accent); color: white; }

        /* Main */
        .main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

        /* Summary Strip */
        .summary-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-fd); }
        .stat-card:nth-child(2)::before { background: var(--gradient-1); }
        .stat-card:nth-child(3)::before { background: var(--gradient-2); }
        .stat-card:nth-child(4)::before { background: var(--gradient-3); }
        .stat-card:nth-child(5)::before { background: linear-gradient(135deg, var(--cyan), var(--teal)); }

        .stat-card .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.3;
        }

        .stat-card .sub { font-size: 13px; }

        .profit { color: var(--green); }
        .loss { color: var(--red); }
        .neutral { color: var(--text-secondary); }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .change-badge.up { background: var(--green-bg); color: var(--green); }
        .change-badge.down { background: var(--red-bg); color: var(--red); }

        /* Charts row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        /* Filter Pills */
        .filter-pills {
            display: flex;
            gap: 6px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .pill {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: inherit;
        }

        .pill:hover { border-color: var(--accent); color: var(--text-secondary); }
        .pill.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* Table */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-toolbar {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-toolbar h3 { font-size: 15px; font-weight: 700; }

        .table-scroll { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        thead th:hover { color: var(--text-secondary); }
        thead th.sorted { color: var(--accent); }

        .sort-icon {
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.5;
        }

        thead th.sorted .sort-icon { opacity: 1; }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background 0.15s;
        }

        tbody tr:hover { background: var(--bg-card-hover); }

        tbody td {
            padding: 14px 16px;
            font-size: 13px;
            white-space: nowrap;
        }

        .bank-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bank-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: white;
            flex-shrink: 0;
        }

        .bank-name { font-weight: 600; color: var(--text-primary); font-size: 14px; }
        .bank-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* Progress Bar */
        .progress-bar {
            width: 80px;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .maturity-badge {
            display: inline-flex;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .maturity-badge.far { background: var(--blue-bg); color: var(--blue); }
        .maturity-badge.soon { background: var(--yellow-bg); color: var(--yellow); }
        .maturity-badge.matured { background: var(--green-bg); color: var(--green); }

        /* Loading */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hide { opacity: 0; pointer-events: none; }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { margin-top: 16px; font-size: 14px; color: var(--text-muted); }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-row { grid-template-columns: 1fr; }
            .main { padding: 16px; }
        }

        @media (max-width: 768px) {
            .header { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
            .summary-strip { grid-template-columns: 1fr 1fr; }
            .table-toolbar { flex-direction: column; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
        .stagger-5 { animation-delay: 0.25s; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading fixed deposit data...</div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">FD</div>
            <div class="header-title">
                <h1>Fixed Deposits</h1>
                <p id="headerSubtitle">Zerodha · Family Holdings</p>
            </div>
        </div>
        <div class="header-right">
            <div class="view-toggle" id="viewToggle">
                <button class="view-btn active" data-view="family">👨‍👩‍👧‍👦 Family</button>
            </div>
            <a href="/" class="btn btn-ghost">← Dashboard</a>
            <a href="/mutual-funds" class="btn btn-ghost">📊 Mutual Funds</a>
            <span class="demo-badge" id="demoBadge">⚡ DEMO DATA</span>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Summary -->
        <div class="summary-strip" id="summaryStrip"></div>

        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card fade-in stagger-1">
                <h3>🏦 FD Allocation by Bank</h3>
                <div class="chart-container">
                    <canvas id="bankChart"></canvas>
                </div>
            </div>
            <div class="chart-card fade-in stagger-2">
                <h3>📊 Interest Rate Comparison</h3>
                <div class="chart-container">
                    <canvas id="rateChart"></canvas>
                </div>
            </div>
        </div>

        <!-- FD Table -->
        <div class="table-card">
            <div class="table-toolbar">
                <h3 id="tableTitle">All Fixed Deposits</h3>
            </div>
            <div class="filter-pills" id="filterPills"></div>
            <div class="table-scroll">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
    // ---- State ----
    let fdData = null;
    let currentSort = { key: 'current_value', dir: 'desc' };
    let memberFilter = 'all';
    let currentView = 'family';

    const COLORS = ['#3b82f6', '#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];

    // ---- Helpers ----
    function fmt(n, d = 0) {
        if (n == null) return '—';
        const abs = Math.abs(n);
        if (abs >= 10000000) return '₹' + (n / 10000000).toFixed(2) + ' Cr';
        if (abs >= 100000) return '₹' + (n / 100000).toFixed(2) + ' L';
        if (abs >= 1000) return '₹' + (n / 1000).toFixed(1) + 'K';
        return '₹' + n.toFixed(d);
    }

    function fmtExact(n) {
        if (n == null) return '—';
        return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(n) {
        if (n == null) return '—';
        return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    function colorFor(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
        return COLORS[Math.abs(h) % COLORS.length];
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function maturityClass(days) {
        if (days <= 0) return 'matured';
        if (days <= 180) return 'soon';
        return 'far';
    }

    function maturityLabel(days) {
        if (days <= 0) return 'Matured';
        if (days >= 365) return `${(days / 365).toFixed(1)}Y`;
        return `${days}d`;
    }

    // ---- Fetch ----
    async function fetchData() {
        try {
            // Fetch FD data and portfolio data in parallel (for member names)
            const [fdResp, portfolioResp] = await Promise.all([
                fetch('/api/fixed-deposits'),
                fetch('/api/portfolio'),
            ]);
            fdData = await fdResp.json();
            const portfolioData = await portfolioResp.json();
            fdData.member_names = portfolioData.member_names || [];
            initViewToggle();
            render();
        } catch (e) {
            console.error('Failed to load FD data:', e);
        } finally {
            document.getElementById('loadingOverlay').classList.add('hide');
        }
    }

    // ---- View Toggle ----
    function initViewToggle() {
        const toggle = document.getElementById('viewToggle');
        const memberNames = fdData.member_names || [];

        toggle.innerHTML = `<button class="view-btn ${currentView === 'family' ? 'active' : ''}" data-view="family">👨‍👩‍👧‍👦 Family</button>`;
        memberNames.forEach(name => {
            toggle.innerHTML += `<button class="view-btn ${currentView === name ? 'active' : ''}" data-view="${name}">${name}</button>`;
        });

        toggle.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentView = btn.dataset.view;
                toggle.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const subtitle = document.getElementById('headerSubtitle');
                subtitle.textContent = currentView === 'family' ? 'Zerodha · Family Holdings' : `Zerodha · ${currentView}`;
                render();
            });
        });
    }

    function getFilteredDeposits() {
        let deposits = fdData.deposits || [];
        if (currentView !== 'family') {
            deposits = deposits.filter(d => d.member === currentView);
        }
        if (memberFilter !== 'all') {
            deposits = deposits.filter(d => d.member === memberFilter);
        }
        return deposits;
    }

    // ---- Render All ----
    function render() {
        if (!fdData) return;
        if (fdData.is_demo) document.getElementById('demoBadge').classList.add('show');
        renderSummary();
        renderCharts();
        renderFilters();
        renderTable();
    }

    // ---- Summary Cards ----
    function renderSummary() {
        const deposits = getFilteredDeposits();
        const totalPrincipal = deposits.reduce((s, d) => s + d.principal, 0);
        const totalCurrent = deposits.reduce((s, d) => s + d.current_value, 0);
        const totalMaturity = deposits.reduce((s, d) => s + d.maturity_value, 0);
        const totalInterest = totalCurrent - totalPrincipal;
        const interestPct = totalPrincipal > 0 ? (totalInterest / totalPrincipal * 100) : 0;
        const avgRate = deposits.length > 0 ? deposits.reduce((s, d) => s + d.interest_rate, 0) / deposits.length : 0;

        const strip = document.getElementById('summaryStrip');
        strip.innerHTML = [
            { label: 'Total FDs', value: deposits.length, sub: currentView === 'family' ? 'Family-wide' : currentView, cls: 'neutral' },
            { label: 'Total Principal', value: fmt(totalPrincipal), sub: '', cls: 'neutral' },
            { label: 'Current Value', value: fmt(totalCurrent), sub: `Interest: ${fmtExact(totalInterest)} (${fmtPct(interestPct)})`, cls: 'profit' },
            { label: 'Maturity Value', value: fmt(totalMaturity), sub: `Total Interest: ${fmtExact(totalMaturity - totalPrincipal)}`, cls: 'neutral' },
            { label: 'Avg Interest Rate', value: avgRate.toFixed(2) + '%', sub: 'Across all FDs', cls: 'neutral' },
        ].map((c, i) => `
            <div class="stat-card fade-in stagger-${i + 1}">
                <div class="label">${c.label}</div>
                <div class="value ${c.cls}">${c.value}</div>
                <div class="sub ${c.cls}">${c.sub}</div>
            </div>
        `).join('');
    }

    // ---- Charts ----
    let charts = {};

    function destroyChart(name) {
        if (charts[name]) { charts[name].destroy(); charts[name] = null; }
    }

    function renderCharts() {
        const deposits = getFilteredDeposits();

        // Bank allocation doughnut
        destroyChart('bank');
        const bankMap = {};
        deposits.forEach(d => {
            bankMap[d.bank] = (bankMap[d.bank] || 0) + d.current_value;
        });
        const bankLabels = Object.keys(bankMap);
        const bankValues = Object.values(bankMap);

        charts.bank = new Chart(document.getElementById('bankChart'), {
            type: 'doughnut',
            data: {
                labels: bankLabels,
                datasets: [{
                    data: bankValues,
                    backgroundColor: bankLabels.map(b => colorFor(b)),
                    borderWidth: 0,
                    hoverOffset: 8,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '62%',
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { color: '#94a3b8', font: { size: 12, family: 'Inter' }, padding: 12, usePointStyle: true, pointStyleWidth: 8 },
                    },
                    tooltip: {
                        backgroundColor: '#1a2234', borderColor: '#2a3548', borderWidth: 1, padding: 12, cornerRadius: 8,
                        callbacks: {
                            label: ctx => {
                                const total = bankValues.reduce((a, b) => a + b, 0);
                                return ` ${ctx.label}: ${fmt(ctx.raw)} (${((ctx.raw / total) * 100).toFixed(1)}%)`;
                            }
                        }
                    },
                },
            },
        });

        // Interest rate bar chart
        destroyChart('rate');
        const sorted = [...deposits].sort((a, b) => b.interest_rate - a.interest_rate);
        const rateLabels = sorted.map(d => d.bank + (sorted.filter(x => x.bank === d.bank).length > 1 ? ` (${d.id})` : ''));
        const rateValues = sorted.map(d => d.interest_rate);
        const rateColors = rateValues.map(v => v >= 7.5 ? '#10b981' : v >= 7 ? '#f59e0b' : '#3b82f6');

        charts.rate = new Chart(document.getElementById('rateChart'), {
            type: 'bar',
            data: {
                labels: rateLabels,
                datasets: [{
                    data: rateValues,
                    backgroundColor: rateColors.map(c => c + '44'),
                    borderColor: rateColors,
                    borderWidth: 1.5,
                    borderRadius: 6,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1a2234', borderColor: '#2a3548', borderWidth: 1, padding: 12, cornerRadius: 8,
                        callbacks: { label: ctx => ` Rate: ${ctx.raw.toFixed(2)}%` }
                    },
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 }, maxRotation: 45 } },
                    y: {
                        grid: { color: '#1e2a3f' },
                        ticks: { color: '#64748b', font: { size: 11 }, callback: v => v + '%' },
                        beginAtZero: true,
                    },
                },
            },
        });
    }

    // ---- Filter Pills ----
    function renderFilters() {
        const members = new Set();
        (fdData.deposits || []).forEach(d => members.add(d.member));

        const pills = document.getElementById('filterPills');

        if (currentView === 'family') {
            pills.style.display = '';
            pills.innerHTML = `<button class="pill active" data-filter="all">All Members</button>`
                + [...members].map(m => `<button class="pill" data-filter="${m}">${m}</button>`).join('');

            pills.querySelectorAll('.pill').forEach(p => {
                p.addEventListener('click', () => {
                    pills.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
                    p.classList.add('active');
                    memberFilter = p.dataset.filter;
                    renderSummary();
                    renderCharts();
                    renderTableBody();
                });
            });
        } else {
            pills.style.display = 'none';
            memberFilter = 'all';
        }
    }

    // ---- Table ----
    const COLS = [
        { key: 'bank', label: 'Bank / Scheme', align: 'left' },
        { key: 'member', label: 'Member', align: 'left' },
        { key: 'principal', label: 'Principal', align: 'right' },
        { key: 'interest_rate', label: 'Rate', align: 'right' },
        { key: 'current_value', label: 'Current Value', align: 'right' },
        { key: 'interest_earned', label: 'Interest Earned', align: 'right' },
        { key: 'investment_date', label: 'Invested', align: 'right' },
        { key: 'maturity_date', label: 'Maturity', align: 'right' },
        { key: 'maturity_value', label: 'Maturity Value', align: 'right' },
        { key: 'progress_pct', label: 'Progress', align: 'center' },
    ];

    function renderTable() {
        const head = document.getElementById('tableHead');
        head.innerHTML = '<tr>' + COLS.map(c => {
            const sorted = currentSort.key === c.key;
            return `<th style="text-align:${c.align}" data-sort="${c.key}" class="${sorted ? 'sorted' : ''}">
                ${c.label}<span class="sort-icon">${sorted ? (currentSort.dir === 'asc' ? '▲' : '▼') : '⇅'}</span>
            </th>`;
        }).join('') + '</tr>';

        head.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.sort;
                if (currentSort.key === key) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
                else { currentSort.key = key; currentSort.dir = 'desc'; }
                renderTable();
            });
        });

        renderTableBody();
    }

    function renderTableBody() {
        let deposits = getFilteredDeposits();

        // Sort
        deposits = [...deposits].sort((a, b) => {
            let va = a[currentSort.key], vb = b[currentSort.key];
            if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
            if (va < vb) return currentSort.dir === 'asc' ? -1 : 1;
            if (va > vb) return currentSort.dir === 'asc' ? 1 : -1;
            return 0;
        });

        document.getElementById('tableTitle').textContent =
            `${deposits.length} Fixed Deposit${deposits.length !== 1 ? 's' : ''}`;

        const body = document.getElementById('tableBody');
        body.innerHTML = deposits.map(d => {
            const color = colorFor(d.bank);
            const mc = maturityClass(d.days_to_maturity);
            const progressColor = d.progress_pct >= 80 ? 'var(--green)' : d.progress_pct >= 50 ? 'var(--yellow)' : 'var(--blue)';

            return `<tr>
                <td>
                    <div class="bank-cell">
                        <div class="bank-icon" style="background:${color}22;color:${color}">${d.bank.substring(0, 2).toUpperCase()}</div>
                        <div>
                            <div class="bank-name">${d.bank}</div>
                            <div class="bank-meta">${d.scheme} · ${d.compounding} · ${d.tenure_months}mo</div>
                        </div>
                    </div>
                </td>
                <td style="color:var(--text-secondary)">${d.member}</td>
                <td style="text-align:right;font-weight:600">${fmtExact(d.principal)}</td>
                <td style="text-align:right">
                    <span style="font-weight:700;color:var(--cyan)">${d.interest_rate.toFixed(2)}%</span>
                </td>
                <td style="text-align:right;font-weight:600">${fmtExact(d.current_value)}</td>
                <td style="text-align:right">
                    <span class="profit" style="font-weight:600">+${fmtExact(d.interest_earned)}</span>
                </td>
                <td style="text-align:right">${formatDate(d.investment_date)}</td>
                <td style="text-align:right">
                    ${formatDate(d.maturity_date)}
                    <br><span class="maturity-badge ${mc}">${d.is_matured ? '✓ Matured' : maturityLabel(d.days_to_maturity) + ' left'}</span>
                </td>
                <td style="text-align:right;font-weight:600">${fmtExact(d.maturity_value)}</td>
                <td style="text-align:center">
                    <div class="progress-bar"><div class="progress-fill" style="width:${d.progress_pct}%;background:${progressColor}"></div></div>
                    <span style="font-size:11px;color:var(--text-secondary)">${d.progress_pct.toFixed(0)}%</span>
                </td>
            </tr>`;
        }).join('');
    }

    // ---- Init ----
    document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
