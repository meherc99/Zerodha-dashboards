<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Funds · Zerodha Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1e2a3f;
            --bg-expanded: #141c2b;
            --border-color: #2a3548;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.12);
            --green-light: #34d399;
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.12);
            --red-light: #f87171;
            --yellow: #f59e0b;
            --yellow-bg: rgba(245, 158, 11, 0.12);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.12);
            --purple: #8b5cf6;
            --pink: #ec4899;
            --cyan: #06b6d4;
            --orange: #f97316;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --gradient-3: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .logo {
            width: 40px; height: 40px;
            background: var(--gradient-2);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px; color: white;
        }

        .header-title h1 {
            font-size: 20px; font-weight: 700;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header-title p { font-size: 12px; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .btn {
            padding: 8px 20px;
            border-radius: var(--radius-xs);
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .btn-primary { background: var(--gradient-1); color: white; }
        .btn-primary:hover { opacity: 0.9; }

        /* View Toggle */
        .view-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xs);
            padding: 4px;
        }

        .view-btn {
            padding: 6px 14px;
            border-radius: 4px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            background: transparent;
            color: var(--text-muted);
        }

        .view-btn:hover { color: var(--text-secondary); }
        .view-btn.active { background: var(--accent); color: white; }

        .demo-badge {
            background: var(--yellow-bg);
            color: var(--yellow);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: none;
        }

        .demo-badge.show { display: inline-block; }

        /* Main */
        .main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

        /* Summary Strip */
        .summary-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-2); }
        .stat-card:nth-child(2)::before { background: var(--gradient-1); }
        .stat-card:nth-child(3)::before { background: var(--gradient-3); }
        .stat-card:nth-child(4)::before { background: linear-gradient(135deg, var(--cyan), var(--blue)); }

        .stat-card .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.3;
        }

        .stat-card .sub { font-size: 13px; }

        .profit { color: var(--green); }
        .loss { color: var(--red); }
        .neutral { color: var(--text-secondary); }

        .change-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .change-badge.up { background: var(--green-bg); color: var(--green); }
        .change-badge.down { background: var(--red-bg); color: var(--red); }

        /* Charts row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        /* Table */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-toolbar {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-toolbar h3 { font-size: 15px; font-weight: 700; }

        .toolbar-right { display: flex; align-items: center; gap: 10px; }

        .search-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xs);
            padding: 8px 14px;
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus { border-color: var(--accent); }

        .filter-pills {
            display: flex;
            gap: 6px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .pill {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: inherit;
        }

        .pill:hover { border-color: var(--accent); color: var(--text-secondary); }

        .pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .table-scroll { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        thead th:hover { color: var(--text-secondary); }
        thead th.sorted { color: var(--accent); }

        .sort-icon {
            margin-left: 4px;
            font-size: 10px;
            opacity: 0.5;
        }

        thead th.sorted .sort-icon { opacity: 1; }

        /* Fund row */
        .fund-row {
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s;
        }

        .fund-row:hover { background: var(--bg-card-hover); }

        .fund-row.expanded { background: var(--bg-card-hover); }

        .fund-row td {
            padding: 14px 16px;
            font-size: 13px;
            white-space: nowrap;
        }

        .fund-symbol-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fund-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: white;
            flex-shrink: 0;
        }

        .fund-name { font-weight: 600; color: var(--text-primary); font-size: 14px; }
        .fund-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .expand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px; height: 24px;
            border-radius: 6px;
            background: var(--bg-primary);
            font-size: 12px;
            transition: transform 0.3s, background 0.2s;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .fund-row.expanded .expand-icon {
            transform: rotate(180deg);
            background: var(--accent);
            color: white;
        }

        /* Drill-down panel */
        .drilldown {
            display: none;
            background: var(--bg-expanded);
            border-bottom: 1px solid var(--border-color);
        }

        .drilldown.open { display: table-row; }

        .drilldown-content {
            padding: 0 24px 24px 24px;
        }

        .drilldown-inner {
            padding: 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
        }

        .drilldown-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .drilldown-title {
            font-size: 16px;
            font-weight: 700;
        }

        .drilldown-stats {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .dd-stat {
            text-align: center;
        }

        .dd-stat .dd-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .dd-stat .dd-value {
            font-size: 15px;
            font-weight: 700;
        }

        /* Member section inside drilldown */
        .member-section {
            margin-bottom: 16px;
        }

        .member-section:last-child { margin-bottom: 0; }

        .member-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xs);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .member-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }

        /* Purchase table */
        .purchase-table {
            width: 100%;
            border-collapse: collapse;
        }

        .purchase-table thead th {
            padding: 10px 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            cursor: default;
        }

        .purchase-table tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background 0.15s;
        }

        .purchase-table tbody tr:last-child { border-bottom: none; }

        .purchase-table tbody tr:hover { background: var(--bg-card); }

        .purchase-table td {
            padding: 10px 12px;
            font-size: 12px;
            white-space: nowrap;
        }

        .date-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .holding-days {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* Timeline bar */
        .timeline-bar {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }

        .timeline-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        /* Annual return pill */
        .annual-pill {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .annual-pill.good { background: var(--green-bg); color: var(--green); }
        .annual-pill.okay { background: var(--yellow-bg); color: var(--yellow); }
        .annual-pill.bad { background: var(--red-bg); color: var(--red); }

        /* Loading */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-overlay.hide { opacity: 0; pointer-events: none; }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { margin-top: 16px; font-size: 14px; color: var(--text-muted); }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-row { grid-template-columns: 1fr; }
            .main { padding: 16px; }
        }

        @media (max-width: 768px) {
            .header { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
            .summary-strip { grid-template-columns: 1fr 1fr; }
            .table-toolbar { flex-direction: column; }
            .search-box { width: 100%; }
            .drilldown-stats { gap: 12px; }
        }

        /* Fade in */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .stagger-1 { animation-delay: 0.05s; }
        .stagger-2 { animation-delay: 0.1s; }
        .stagger-3 { animation-delay: 0.15s; }
        .stagger-4 { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading mutual fund data...</div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">MF</div>
            <div class="header-title">
                <h1>Mutual Funds & ETFs</h1>
                <p id="headerSubtitle">Zerodha · Family Holdings</p>
            </div>
        </div>
        <div class="header-right">
            <div class="view-toggle" id="viewToggle">
                <button class="view-btn active" data-view="family">👨‍👩‍👧‍👦 Family</button>
            </div>
            <a href="/" class="btn btn-ghost">← Dashboard</a>
            <a href="/fixed-deposits" class="btn btn-ghost" style="text-decoration:none">🏦 Fixed Deposits</a>
            <span class="demo-badge" id="demoBadge">⚡ DEMO DATA</span>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <!-- Summary -->
        <div class="summary-strip" id="summaryStrip"></div>

        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card fade-in stagger-1">
                <h3>📊 Fund Allocation</h3>
                <div class="chart-container">
                    <canvas id="allocChart"></canvas>
                </div>
            </div>
            <div class="chart-card fade-in stagger-2">
                <h3>💰 Profit / Loss by Fund</h3>
                <div class="chart-container">
                    <canvas id="pnlChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Funds Table -->
        <div class="table-card">
            <div class="table-toolbar">
                <h3 id="tableTitle">All Mutual Funds & ETFs</h3>
                <div class="toolbar-right">
                    <input type="text" class="search-box" id="searchBox" placeholder="Search fund name...">
                </div>
            </div>
            <div class="filter-pills" id="filterPills"></div>
            <div class="table-scroll">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
    // ---- State ----
    let mfData = null;
    let expandedFund = null;
    let currentSort = { key: 'total_current', dir: 'desc' };
    let searchQuery = '';
    let memberFilter = 'all';
    let currentView = 'family';

    const COLORS = ['#10b981', '#6366f1', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
    const MEMBER_COLORS = { 'Primary': '#6366f1', 'Spouse': '#10b981' };

    // ---- Helpers ----
    function fmt(n, d = 0) {
        if (n == null) return '—';
        const abs = Math.abs(n);
        if (abs >= 10000000) return '₹' + (n / 10000000).toFixed(2) + ' Cr';
        if (abs >= 100000) return '₹' + (n / 100000).toFixed(2) + ' L';
        if (abs >= 1000) return '₹' + (n / 1000).toFixed(1) + 'K';
        return '₹' + n.toFixed(d);
    }

    function fmtExact(n) {
        if (n == null) return '—';
        return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(n) {
        if (n == null) return '—';
        return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    function pnlClass(n) { return n >= 0 ? 'profit' : 'loss'; }

    function annualClass(n) {
        if (n >= 15) return 'good';
        if (n >= 0) return 'okay';
        return 'bad';
    }

    function colorFor(sym) {
        let h = 0;
        for (let i = 0; i < sym.length; i++) h = sym.charCodeAt(i) + ((h << 5) - h);
        return COLORS[Math.abs(h) % COLORS.length];
    }

    function memberColor(name) {
        return MEMBER_COLORS[name] || COLORS[Object.keys(MEMBER_COLORS).length % COLORS.length];
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    // ---- Fetch ----
    async function fetchData() {
        try {
            const [mfResp, portfolioResp] = await Promise.all([
                fetch('/api/mutual-funds'),
                fetch('/api/portfolio'),
            ]);
            mfData = await mfResp.json();
            const portfolioData = await portfolioResp.json();
            mfData.member_names = portfolioData.member_names || [];
            initViewToggle();
            render();
        } catch (e) {
            console.error('Failed to load MF data:', e);
        } finally {
            document.getElementById('loadingOverlay').classList.add('hide');
        }
    }

    // ---- View Toggle ----
    function initViewToggle() {
        const toggle = document.getElementById('viewToggle');
        const memberNames = mfData.member_names || [];

        toggle.innerHTML = `<button class="view-btn ${currentView === 'family' ? 'active' : ''}" data-view="family">👨‍👩‍👧‍👦 Family</button>`;
        memberNames.forEach(name => {
            toggle.innerHTML += `<button class="view-btn ${currentView === name ? 'active' : ''}" data-view="${name}">${name}</button>`;
        });

        toggle.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentView = btn.dataset.view;
                toggle.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const subtitle = document.getElementById('headerSubtitle');
                subtitle.textContent = currentView === 'family' ? 'Zerodha · Family Holdings' : `Zerodha · ${currentView}`;
                render();
            });
        });
    }

    function getViewFilteredFunds() {
        let funds = mfData.funds || [];
        if (currentView !== 'family') {
            // Filter funds to only those held by the selected member
            funds = funds.filter(f => (f.members || []).some(m => m.member === currentView));
        }
        return funds;
    }

    // ---- Render All ----
    function render() {
        if (!mfData) return;
        if (mfData.is_demo) document.getElementById('demoBadge').classList.add('show');
        renderSummary();
        renderCharts();
        renderFilters();
        renderTable();
    }

    // ---- Summary Cards ----
    function renderSummary() {
        const funds = getViewFilteredFunds();
        const total_funds = funds.length;
        const total_invested = funds.reduce((s, f) => s + f.total_invested, 0);
        const total_current = funds.reduce((s, f) => s + f.total_current, 0);
        const total_profit = total_current - total_invested;
        const total_profit_pct = total_invested > 0 ? (total_profit / total_invested * 100) : 0;

        const strip = document.getElementById('summaryStrip');
        strip.innerHTML = [
            { label: 'Total Funds', value: total_funds, sub: currentView === 'family' ? 'Mutual Funds & ETFs' : currentView, cls: 'neutral' },
            { label: 'Total Invested', value: fmt(total_invested), sub: '', cls: 'neutral' },
            { label: 'Current Value', value: fmt(total_current), sub: '', cls: 'neutral' },
            { label: 'Total P&L', value: (total_profit >= 0 ? '+' : '') + fmt(total_profit), sub: fmtPct(total_profit_pct), cls: pnlClass(total_profit) },
        ].map((c, i) => `
            <div class="stat-card fade-in stagger-${i + 1}">
                <div class="label">${c.label}</div>
                <div class="value ${c.cls}">${c.value}</div>
                <div class="sub ${c.cls}">${c.sub}</div>
            </div>
        `).join('');
    }

    // ---- Charts ----
    let charts = {};

    function destroyChart(name) {
        if (charts[name]) { charts[name].destroy(); charts[name] = null; }
    }

    function renderCharts() {
        const funds = getViewFilteredFunds();

        // Allocation doughnut
        destroyChart('alloc');
        const allocLabels = funds.map(f => f.tradingsymbol);
        const allocValues = funds.map(f => f.total_current);

        charts.alloc = new Chart(document.getElementById('allocChart'), {
            type: 'doughnut',
            data: {
                labels: allocLabels,
                datasets: [{
                    data: allocValues,
                    backgroundColor: funds.map(f => colorFor(f.tradingsymbol)),
                    borderWidth: 0,
                    hoverOffset: 8,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '62%',
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { color: '#94a3b8', font: { size: 12, family: 'Inter' }, padding: 12, usePointStyle: true, pointStyleWidth: 8 },
                    },
                    tooltip: {
                        backgroundColor: '#1a2234', borderColor: '#2a3548', borderWidth: 1, padding: 12, cornerRadius: 8,
                        callbacks: {
                            label: ctx => {
                                const total = allocValues.reduce((a, b) => a + b, 0);
                                return ` ${ctx.label}: ${fmt(ctx.raw)} (${((ctx.raw / total) * 100).toFixed(1)}%)`;
                            }
                        }
                    },
                },
            },
        });

        // PnL bar chart
        destroyChart('pnl');
        const sorted = [...funds].sort((a, b) => b.total_profit - a.total_profit);
        const pnlLabels = sorted.map(f => f.tradingsymbol);
        const pnlValues = sorted.map(f => f.total_profit);
        const pnlColors = pnlValues.map(v => v >= 0 ? '#10b981' : '#ef4444');

        charts.pnl = new Chart(document.getElementById('pnlChart'), {
            type: 'bar',
            data: {
                labels: pnlLabels,
                datasets: [{
                    data: pnlValues,
                    backgroundColor: pnlColors.map(c => c + '44'),
                    borderColor: pnlColors,
                    borderWidth: 1.5,
                    borderRadius: 6,
                }],
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1a2234', borderColor: '#2a3548', borderWidth: 1, padding: 12, cornerRadius: 8,
                        callbacks: { label: ctx => ` P&L: ${fmtExact(ctx.raw)}` }
                    },
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
                    y: { grid: { color: '#1e2a3f' }, ticks: { color: '#64748b', font: { size: 11 }, callback: v => fmt(v) } },
                },
            },
        });
    }

    // ---- Filter Pills ----
    function renderFilters() {
        const members = new Set();
        (mfData.funds || []).forEach(f => (f.members || []).forEach(m => members.add(m.member)));

        const pills = document.getElementById('filterPills');

        if (currentView === 'family') {
            pills.style.display = '';
            pills.innerHTML = `<button class="pill active" data-filter="all">All Members</button>`
                + [...members].map(m => `<button class="pill" data-filter="${m}">${m}</button>`).join('');

            pills.querySelectorAll('.pill').forEach(p => {
                p.addEventListener('click', () => {
                    pills.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
                    p.classList.add('active');
                    memberFilter = p.dataset.filter;
                    renderTableBody();
                });
            });
        } else {
            pills.style.display = 'none';
            memberFilter = currentView;
        }
    }

    // ---- Table ----
    const COLS = [
        { key: '_expand', label: '', align: 'center', width: '40px' },
        { key: 'tradingsymbol', label: 'Fund', align: 'left' },
        { key: 'total_quantity', label: 'Units', align: 'right' },
        { key: 'last_price', label: 'NAV / LTP', align: 'right' },
        { key: 'total_invested', label: 'Invested', align: 'right' },
        { key: 'total_current', label: 'Current', align: 'right' },
        { key: 'total_profit', label: 'P&L', align: 'right' },
        { key: 'profit_pct', label: 'P&L %', align: 'right' },
        { key: 'day_change_percentage', label: 'Day %', align: 'right' },
        { key: 'cagr_2y', label: '2Y CAGR', align: 'right' },
        { key: 'forecasted_cagr_2y', label: 'Fcast 2Y CAGR', align: 'right' },
    ];

    function renderTable() {
        const head = document.getElementById('tableHead');
        head.innerHTML = '<tr>' + COLS.map(c => {
            if (c.key === '_expand') return `<th style="width:${c.width}"></th>`;
            const sorted = currentSort.key === c.key;
            return `<th style="text-align:${c.align}" data-sort="${c.key}" class="${sorted ? 'sorted' : ''}">
                ${c.label}<span class="sort-icon">${sorted ? (currentSort.dir === 'asc' ? '▲' : '▼') : '⇅'}</span>
            </th>`;
        }).join('') + '</tr>';

        head.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.sort;
                if (currentSort.key === key) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
                else { currentSort.key = key; currentSort.dir = 'desc'; }
                renderTable();
            });
        });

        document.getElementById('searchBox').oninput = (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderTableBody();
        };

        renderTableBody();
    }

    function renderTableBody() {
        let funds = getViewFilteredFunds();

        // Member filter — filter funds that have holdings from that member
        if (memberFilter !== 'all') {
            funds = funds.filter(f => (f.members || []).some(m => m.member === memberFilter));
        }

        // Search
        if (searchQuery) {
            funds = funds.filter(f => f.tradingsymbol.toLowerCase().includes(searchQuery));
        }

        // Sort
        funds.sort((a, b) => {
            let va = a[currentSort.key], vb = b[currentSort.key];
            if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
            if (va < vb) return currentSort.dir === 'asc' ? -1 : 1;
            if (va > vb) return currentSort.dir === 'asc' ? 1 : -1;
            return 0;
        });

        document.getElementById('tableTitle').textContent =
            `${funds.length} Mutual Fund${funds.length !== 1 ? 's' : ''} & ETFs`;

        const body = document.getElementById('tableBody');
        body.innerHTML = '';

        funds.forEach(f => {
            const color = colorFor(f.tradingsymbol);
            const isExpanded = expandedFund === f.tradingsymbol;
            const memberCount = (f.members || []).length;

            // — Main row —
            const tr = document.createElement('tr');
            tr.className = `fund-row${isExpanded ? ' expanded' : ''}`;
            tr.innerHTML = `
                <td style="text-align:center;width:40px">
                    <div class="expand-icon">▼</div>
                </td>
                <td>
                    <div class="fund-symbol-cell">
                        <div class="fund-icon" style="background:${color}22;color:${color}">${f.tradingsymbol.substring(0, 2)}</div>
                        <div>
                            <div class="fund-name">${f.tradingsymbol}</div>
                            <div class="fund-meta">${f.exchange} · ${memberCount} member${memberCount !== 1 ? 's' : ''} · ${f.purchases ? f.purchases.length : 0} purchases</div>
                        </div>
                    </div>
                </td>
                <td style="text-align:right;font-weight:600">${f.total_quantity}</td>
                <td style="text-align:right;font-weight:600">${fmtExact(f.last_price)}</td>
                <td style="text-align:right">${fmtExact(f.total_invested)}</td>
                <td style="text-align:right;font-weight:600">${fmtExact(f.total_current)}</td>
                <td style="text-align:right">
                    <span class="${pnlClass(f.total_profit)}" style="font-weight:600">${(f.total_profit >= 0 ? '+' : '') + fmtExact(f.total_profit)}</span>
                </td>
                <td style="text-align:right">
                    <span class="change-badge ${f.profit_pct >= 0 ? 'up' : 'down'}">${fmtPct(f.profit_pct)}</span>
                </td>
                <td style="text-align:right">
                    <span class="${pnlClass(f.day_change_percentage)}">${fmtPct(f.day_change_percentage)}</span>
                </td>
                <td style="text-align:right">
                    <span class="annual-pill ${annualClass(f.cagr_2y || 0)}">${fmtPct(f.cagr_2y || 0)}</span>
                </td>
                <td style="text-align:right">
                    ${f.forecasted_cagr_2y != null
                        ? `<span class="annual-pill ${annualClass(f.forecasted_cagr_2y)}" style="border:1px dashed currentColor">${fmtPct(f.forecasted_cagr_2y)}</span>`
                        : '<span style="color:var(--text-muted)">—</span>'
                    }
                </td>
            `;

            tr.addEventListener('click', () => {
                expandedFund = expandedFund === f.tradingsymbol ? null : f.tradingsymbol;
                renderTableBody();
            });

            body.appendChild(tr);

            // — Drill-down row —
            if (isExpanded) {
                const ddTr = document.createElement('tr');
                ddTr.className = 'drilldown open';
                const ddTd = document.createElement('td');
                ddTd.colSpan = COLS.length;
                ddTd.innerHTML = buildDrilldown(f);
                ddTr.appendChild(ddTd);
                body.appendChild(ddTr);
            }
        });
    }

    // ---- Build Drill-down HTML ----
    function buildDrilldown(fund) {
        const purchases = fund.purchases || [];
        const members = fund.members || [];

        // Group purchases by member
        const byMember = {};
        purchases.forEach(p => {
            if (!byMember[p.member]) byMember[p.member] = [];
            byMember[p.member].push(p);
        });

        // Compute max days for timeline scaling
        const maxDays = Math.max(...purchases.map(p => p.days_held || 1), 1);

        let membersHtml = '';

        // If filtering by member, only show that member
        const membersToShow = memberFilter !== 'all'
            ? members.filter(m => m.member === memberFilter)
            : members;

        membersToShow.forEach(m => {
            const mColor = memberColor(m.member);
            const mPurchases = byMember[m.member] || [];

            const totalMInvested = mPurchases.reduce((s, p) => s + p.invested, 0);
            const totalMCurrent = mPurchases.reduce((s, p) => s + p.current_value, 0);
            const totalMProfit = totalMCurrent - totalMInvested;
            const totalMPct = totalMInvested > 0 ? (totalMProfit / totalMInvested * 100) : 0;

            membersHtml += `
            <div class="member-section">
                <div class="member-badge">
                    <span class="member-dot" style="background:${mColor}"></span>
                    ${m.user_name || m.member}
                    <span style="color:var(--text-muted);font-weight:400;margin-left:4px">
                        · ${m.quantity} units · Invested ${fmtExact(m.invested)}
                        · Current ${fmtExact(m.current)}
                        · <span class="${pnlClass(m.profit)}">${(m.profit >= 0 ? '+' : '') + fmtExact(m.profit)} (${fmtPct(m.profit_pct)})</span>
                    </span>
                </div>

                ${mPurchases.length > 0 ? `
                <table class="purchase-table">
                    <thead>
                        <tr>
                            <th style="text-align:left">Purchase Date</th>
                            <th style="text-align:right">Units</th>
                            <th style="text-align:right">Buy Price</th>
                            <th style="text-align:right">Current Price</th>
                            <th style="text-align:right">Invested</th>
                            <th style="text-align:right">Current Value</th>
                            <th style="text-align:right">Profit</th>
                            <th style="text-align:right">Profit %</th>
                            <th style="text-align:right">Days Held</th>
                            <th style="text-align:right">Ann. Return</th>
                            <th style="text-align:right">2Y CAGR</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${mPurchases.map(p => {
                            const timelinePct = Math.min((p.days_held / maxDays) * 100, 100);
                            const tlColor = p.profit >= 0 ? 'var(--green)' : 'var(--red)';
                            return `
                            <tr>
                                <td>
                                    <div class="date-cell">
                                        <span class="date-dot" style="background:${mColor}"></span>
                                        ${formatDate(p.date)}
                                    </div>
                                </td>
                                <td style="text-align:right;font-weight:600">${p.quantity}</td>
                                <td style="text-align:right">${fmtExact(p.purchase_price)}</td>
                                <td style="text-align:right;font-weight:600">${fmtExact(p.current_price)}</td>
                                <td style="text-align:right">${fmtExact(p.invested)}</td>
                                <td style="text-align:right;font-weight:600">${fmtExact(p.current_value)}</td>
                                <td style="text-align:right">
                                    <span class="${pnlClass(p.profit)}" style="font-weight:600">${(p.profit >= 0 ? '+' : '') + fmtExact(p.profit)}</span>
                                </td>
                                <td style="text-align:right">
                                    <span class="change-badge ${p.profit_pct >= 0 ? 'up' : 'down'}">${fmtPct(p.profit_pct)}</span>
                                </td>
                                <td style="text-align:right">
                                    ${p.days_held}d
                                    <div class="timeline-bar"><div class="timeline-fill" style="width:${timelinePct}%;background:${tlColor}"></div></div>
                                </td>
                                <td style="text-align:right">
                                    <span class="annual-pill ${annualClass(p.annualized_return)}">${fmtPct(p.annualized_return)}</span>
                                </td>
                                <td style="text-align:right">
                                    <span class="annual-pill ${annualClass(p.cagr_2y || 0)}">${fmtPct(p.cagr_2y || 0)}</span>
                                </td>
                            </tr>`;
                        }).join('')}
                        <tr style="background:var(--bg-card)">
                            <td style="font-weight:700;color:var(--text-secondary)">Total</td>
                            <td style="text-align:right;font-weight:700">${mPurchases.reduce((s, p) => s + p.quantity, 0)}</td>
                            <td></td><td></td>
                            <td style="text-align:right;font-weight:700">${fmtExact(totalMInvested)}</td>
                            <td style="text-align:right;font-weight:700">${fmtExact(totalMCurrent)}</td>
                            <td style="text-align:right;font-weight:700">
                                <span class="${pnlClass(totalMProfit)}">${(totalMProfit >= 0 ? '+' : '') + fmtExact(totalMProfit)}</span>
                            </td>
                            <td style="text-align:right">
                                <span class="change-badge ${totalMPct >= 0 ? 'up' : 'down'}">${fmtPct(totalMPct)}</span>
                            </td>
                            <td></td><td></td><td></td>
                        </tr>
                    </tbody>
                </table>
                ` : `<div style="padding:12px;color:var(--text-muted);font-size:13px">No individual purchase data available</div>`}
            </div>`;
        });

        // Summary stats for the drilldown header
        const totalPurchases = purchases.length;
        const earliestDate = purchases.length > 0 ? purchases[0].date : '—';
        const latestDate = purchases.length > 0 ? purchases[purchases.length - 1].date : '—';
        const avgAnnual = purchases.length > 0
            ? purchases.reduce((s, p) => s + p.annualized_return, 0) / purchases.length
            : 0;

        const forecastedCagr = fund.forecasted_cagr_2y;

        return `
        <div class="drilldown-content">
            <div class="drilldown-inner">
                <div class="drilldown-header">
                    <div>
                        <div class="drilldown-title">${fund.tradingsymbol} — Purchase History</div>
                        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
                            52W Range: ${fmtExact(fund.week_52_low)} — ${fmtExact(fund.week_52_high)}
                        </div>
                    </div>
                    <div class="drilldown-stats">
                        <div class="dd-stat">
                            <div class="dd-label">Purchases</div>
                            <div class="dd-value">${totalPurchases}</div>
                        </div>
                        <div class="dd-stat">
                            <div class="dd-label">First Buy</div>
                            <div class="dd-value">${earliestDate !== '—' ? formatDate(earliestDate) : '—'}</div>
                        </div>
                        <div class="dd-stat">
                            <div class="dd-label">Last Buy</div>
                            <div class="dd-value">${latestDate !== '—' ? formatDate(latestDate) : '—'}</div>
                        </div>
                        <div class="dd-stat">
                            <div class="dd-label">Avg Ann. Return</div>
                            <div class="dd-value"><span class="annual-pill ${annualClass(avgAnnual)}">${fmtPct(avgAnnual)}</span></div>
                        </div>
                        <div class="dd-stat">
                            <div class="dd-label">Fcast 2Y CAGR</div>
                            <div class="dd-value">${forecastedCagr != null
                                ? `<span class="annual-pill ${annualClass(forecastedCagr)}" style="border:1px dashed currentColor">${fmtPct(forecastedCagr)}</span>`
                                : '<span style="color:var(--text-muted)">—</span>'
                            }</div>
                        </div>
                        <div class="dd-stat">
                            <div class="dd-label">Total Invested</div>
                            <div class="dd-value">${fmt(fund.total_invested)}</div>
                        </div>
                        <div class="dd-stat">
                            <div class="dd-label">Total Profit</div>
                            <div class="dd-value ${pnlClass(fund.total_profit)}">${(fund.total_profit >= 0 ? '+' : '') + fmt(fund.total_profit)}</div>
                        </div>
                    </div>
                </div>
                ${membersHtml}
            </div>
        </div>`;
    }

    // ---- Init ----
    document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
